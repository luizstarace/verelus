name: Daily Briefing
on:
  schedule:
    # 8:00 AM BRT = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Send Daily Briefing
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            "${{ secrets.APP_URL }}/api/briefing/daily")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" != "200" ]; then
            echo "Daily briefing failed with status $http_code"
            exit 1
          fi

          echo "Daily briefing sent successfully"

      - name: Notify on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content":"Daily briefing failed to send. Check GitHub Actions for details."}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
