name: UI Audit
on:
  schedule:
    - cron: '0 14 * * 1' # Monday 11am BRT
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npx playwright test e2e/audit/ --project=chromium
        env:
          BASE_URL: ${{ secrets.APP_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-audit-report
          path: playwright-report/
      - name: Notify results
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content":"⚠️ UI Audit encontrou problemas! Veja o relatorio no GitHub Actions."}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
