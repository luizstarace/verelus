name: Uptime Monitor

on:
  schedule:
    - cron: '0 * * * *'  # hourly (free tier safe; ~720 min/m├¬s)
  workflow_dispatch:  # allow manual trigger

permissions:
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Atalaia health endpoint
        id: probe
        run: |
          set +e
          BODY=$(curl -s --max-time 15 -w "\n__HTTP_CODE__%{http_code}" "https://atalaia.verelus.com/api/health/atalaia")
          HTTP_CODE=$(echo "$BODY" | grep -oP '(?<=__HTTP_CODE__)\d+$')
          PAYLOAD=$(echo "$BODY" | sed 's/__HTTP_CODE__.*$//')

          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "## Health probe" >> "$GITHUB_STEP_SUMMARY"
          echo "- HTTP: \`$HTTP_CODE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`json" >> "$GITHUB_STEP_SUMMARY"
          echo "$PAYLOAD" | head -c 2000 >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

          STATUS=$(echo "$PAYLOAD" | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          SUPABASE_OK=$(echo "$PAYLOAD" | jq -r '.checks.supabase.ok // false' 2>/dev/null || echo "false")
          CLAUDE_OK=$(echo "$PAYLOAD" | jq -r '.checks.claude.ok // false' 2>/dev/null || echo "false")
          EVOLUTION_OK=$(echo "$PAYLOAD" | jq -r '.checks.evolution.ok // false' 2>/dev/null || echo "false")
          echo "- Critical: supabase=\`$SUPABASE_OK\` claude=\`$CLAUDE_OK\` evolution=\`$EVOLUTION_OK\`" >> "$GITHUB_STEP_SUMMARY"

          # Build a compact failure summary for issue body
          {
            echo "**HTTP**: \`$HTTP_CODE\`"
            echo ""
            echo "**Critical checks**: supabase=\`$SUPABASE_OK\` claude=\`$CLAUDE_OK\` evolution=\`$EVOLUTION_OK\`"
            echo ""
            echo "**Body**:"
            echo '```json'
            echo "$PAYLOAD" | head -c 2000
            echo ''
            echo '```'
          } > /tmp/probe-summary.md
          echo "summary_path=/tmp/probe-summary.md" >> "$GITHUB_OUTPUT"

          # Endpoint unreachable (anything other than 200/503 ŌĆö both indicate the app responded).
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "503" ]; then
            echo "FAIL: HTTP=$HTTP_CODE (endpoint unreachable)"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Critical services down (Supabase / Claude / Evolution). Zenvia/Twilio s├Żo opcionais.
          if [ "$SUPABASE_OK" != "true" ] || [ "$CLAUDE_OK" != "true" ] || [ "$EVOLUTION_OK" != "true" ]; then
            echo "FAIL: critical service down (supabase=$SUPABASE_OK claude=$CLAUDE_OK evolution=$EVOLUTION_OK)"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "OK: HTTP=$HTTP_CODE, critical services healthy"
          echo "failed=false" >> "$GITHUB_OUTPUT"

      - name: Open / update incident issue if down
        if: steps.probe.outputs.failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Look for an existing open incident issue
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --label uptime-incident --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          body_file=${{ steps.probe.outputs.summary_path }}

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body-file "$body_file"
            echo "Commented on existing incident #$existing"
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "­¤Ü© Atalaia uptime alert ŌĆö $(date -u +%Y-%m-%d\ %H:%M\ UTC)" \
              --label uptime-incident \
              --body-file "$body_file"
            echo "Opened new incident issue"
          fi

      - name: Auto-close incident if recovered
        if: steps.probe.outputs.failed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --label uptime-incident --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "Ō£ģ Service recovered at $(date -u +%Y-%m-%dT%H:%M:%SZ)."
            gh issue close "$existing" --repo "$GITHUB_REPOSITORY" --reason completed
            echo "Auto-closed recovered incident #$existing"
          fi
