name: Weekly Growth Report

on:
  schedule:
    # Every Monday at 9am BRT (UTC-3) = 12:00 UTC
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Weekly Growth Report
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-service-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            "${{ secrets.APP_URL }}/api/analytics/weekly")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" != "200" ]; then
            echo "Weekly growth report failed with status $http_code"
            exit 1
          fi

          echo "Weekly growth report generated successfully"

      - name: Notify on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content":"⚠️ Weekly Growth Report FAILED! Check the workflow logs."}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
